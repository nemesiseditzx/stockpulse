<!DOCTYPE html>
<html>
<head>
<title>Halal Checker</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:sans-serif;
  text-align:center;
  padding:40px;
}

input,button{
  padding:10px;
  margin:10px;
  border:none;
  border-radius:6px;
}

button{
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.card{
  margin-top:30px;
  padding:20px;
  border-radius:10px;
  display:inline-block;
  min-width:200px;
}

.halal{ background:green; }
.haram{ background:red; }
.doubt{ background:orange; }
.unknown{ background:gray; }
</style>
</head>

<body>

<h1>🕌 Halal Stock Checker</h1>

<input id="symbol" placeholder="AAPL">
<button onclick="check()">Check</button>

<div id="result"></div>

<script>
const API = "https://stockpulsebadhoneditzx.up.railway.app/";

function check(){
  let s = document.getElementById("symbol").value.trim();

  if(!s) return;

  fetch(API + "halal/" + s)
  .then(r => r.json())
  .then(d => {
    let status = d.status;

    let cls = "unknown";
    if(status === "HALAL") cls = "halal";
    else if(status === "HARAM") cls = "haram";
    else if(status === "DOUBTFUL") cls = "doubt";

    document.getElementById("result").innerHTML = `
      <div class="card ${cls}">
        <h2>${s.toUpperCase()}</h2>
        <h1>${status}</h1>
      </div>
    `;
  })
  .catch(() => {
    document.getElementById("result").innerHTML = "ERROR";
  });
}
</script>

</body>
</html>
