<!DOCTYPE html>
<html>
<body style="background:#020617;color:white;font-family:sans-serif">

<h1>🕌 Halal Checker</h1>

<input id="s" placeholder="AAPL">
<button onclick="check()">Check</button>

<h2 id="r"></h2>

<script>
const API="https://stockpulsebadhoneditzx.up.railway.app/";

function check(){
let s=document.getElementById("s").value;

fetch(API+"halal/"+s)
.then(r=>r.json())
.then(d=>{
document.getElementById("r").innerText=d.status;
});
}
</script>

</body>
</html>
