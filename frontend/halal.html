<!DOCTYPE html>
<html>
<head>
  <title>Halal Checker | StockPulse PRO</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .center-box{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      margin-top:60px;
    }

    .search-box{
      display:flex;
      gap:10px;
      margin:20px 0;
    }

    .result{
      font-size:28px;
      font-weight:bold;
      margin-top:20px;
    }

    .halal{color:#22c55e}
    .haram{color:#ef4444}
    .unknown{color:gray}

    .info-card{
      background:#111827;
      padding:20px;
      border-radius:12px;
      margin-top:20px;
      max-width:400px;
      text-align:center;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🚀 StockPulse</h2>
  <a href="index.html">Dashboard</a>
  <a href="halal.html">Halal</a>
  <a href="news.html">News</a>
  <a href="signals.html">Signals</a>
  <a href="alerts.html">Alerts</a>
</div>

<!-- MAIN -->
<div class="main">

  <h1>🕌 Halal Stock Checker</h1>

  <div class="center-box">

    <div class="search-box">
      <input id="symbol" placeholder="Enter stock (e.g. AAPL)">
      <button onclick="checkHalal()">Check</button>
    </div>

    <div id="result" class="result">Type a symbol</div>

    <div id="info" class="info-card">
      Enter a stock symbol to check if it is halal or haram.
    </div>

  </div>

</div>

<script src="halal.js"></script>

</body>
</html>
