<!DOCTYPE html>
<html>
<head>
<title>StockPulse PRO - Signals</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:sans-serif;
  margin:0;
}

/* HEADER */
h1{
  text-align:center;
  padding:20px;
}

/* CONTAINER */
#signals{
  max-width:800px;
  margin:auto;
}

/* CARD */
.card{
  background:#1e293b;
  padding:20px;
  margin:15px;
  border-radius:12px;
  transition:0.3s;
  opacity:0;
  transform:translateY(20px);
}

/* ANIMATION */
.show{
  opacity:1;
  transform:translateY(0);
}

/* BUY / SELL COLORS */
.buy{
  border-left:6px solid lime;
  box-shadow:0 0 15px rgba(0,255,0,0.3);
}

.sell{
  border-left:6px solid red;
  box-shadow:0 0 15px rgba(255,0,0,0.3);
}

/* HOVER */
.card:hover{
  transform:scale(1.03);
}

/* SYMBOL */
.symbol{
  font-size:24px;
  font-weight:bold;
}

/* ACTION */
.action{
  font-size:18px;
  margin-top:5px;
}

/* PRICE */
.price{
  font-size:20px;
  margin-top:10px;
}

/* BUTTON */
.btn{
  margin-top:10px;
  display:inline-block;
  padding:8px 12px;
  background:cyan;
  color:black;
  border-radius:6px;
  text-decoration:none;
}
</style>

</head>

<body>

<h1>📡 Live Trading Signals</h1>

<div id="signals"></div>

<script>
<script>
const API = "https://stockpulsebadhoneditzx.up.railway.app/signals-live";

function loadSignals(){
  fetch(API)
  .then(r => r.json())
  .then(data => {

    let container = document.getElementById("signals");
    container.innerHTML = "";

    data.forEach((item, index) => {

      let text = item.text || "";

      // 🔥 detect values from raw text
      let symbol = (text.match(/Alert:\s*(\w+)/) || [])[1] || "Unknown";
      let action = text.includes("Buy") ? "BUY" : (text.includes("Sell") ? "SELL" : "UNKNOWN");
      let price = (text.match(/\$(\d+\.?\d*)/) || [])[1] || "-";

      let div = document.createElement("div");

      div.style.background = "#1e293b";
      div.style.padding = "20px";
      div.style.margin = "15px";
      div.style.borderRadius = "12px";

      div.innerHTML = `
        <h2>${symbol}</h2>
        <p>${action} SIGNAL</p>
        <p>$${price}</p>

        <p style="font-size:12px;opacity:0.7;">${text}</p>

        <a href="https://www.tradingview.com/chart/?symbol=${symbol}" target="_blank">
          📊 View Chart
        </a>
      `;

      container.appendChild(div);
    });

  });
}

loadSignals();
setInterval(loadSignals, 5000);
</script>

</body>
</html>
