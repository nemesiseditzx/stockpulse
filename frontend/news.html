<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Market Intelligence | StockPulse PRO</title>

<link rel="stylesheet" href="style.css?v=2">

<style>

/* 🔥 GRID */
.news-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;
  margin-top:20px;
}

/* 💎 CARD */
.news-card{
  background:rgba(15,23,42,0.7);
  backdrop-filter: blur(10px);
  border-radius:14px;
  overflow:hidden;
  transition:0.3s;
  cursor:pointer;
  border:1px solid rgba(255,255,255,0.05);
}

.news-card:hover{
  transform:translateY(-6px) scale(1.02);
  box-shadow:0 0 20px rgba(0,255,255,0.25);
}

/* 🖼 IMAGE */
.news-img{
  width:100%;
  height:170px;
  object-fit:cover;
}

/* 📦 CONTENT */
.news-content{
  padding:14px;
}

/* 🧾 TITLE */
.news-title{
  font-size:15px;
  font-weight:bold;
  margin-bottom:6px;
}

/* 📄 SUMMARY */
.news-summary{
  font-size:13px;
  color:#94a3b8;
}

/* ⚡ EXTRA INFO */
.news-extra{
  margin-top:10px;
  font-size:13px;
}

.bull{color:#22c55e;}
.bear{color:#ef4444;}
.neutral{color:#94a3b8;}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🚀 StockPulse</h2>

  <a href="index.html">Dashboard</a>
  <a href="halal.html">Halal</a>
  <a href="news.html">News</a>
  <a href="signals.html">Signals</a>
  <a href="alerts.html">Alerts</a>
</div>

<!-- MAIN -->
<div class="main">

<h1>📰 Market Intelligence</h1>
<p style="color:#94a3b8;">
AI-powered market insights with sentiment & sector analysis
</p>

<div id="news" class="news-grid"></div>

</div>

<script src="news.js?v=2"></script>

</body>
</html>
