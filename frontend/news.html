<!DOCTYPE html>
<html>
<head>
  <title>Market News | StockPulse PRO</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .news-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
      gap:16px;
      margin-top:20px;
    }

    .news-card{
      background:#111827;
      border-radius:12px;
      overflow:hidden;
      transition:0.3s;
      cursor:pointer;
    }

    .news-card:hover{
      transform:scale(1.02);
      box-shadow:0 0 12px #3b82f6;
    }

    .news-img{
      width:100%;
      height:180px;
      object-fit:cover;
    }

    .news-content{
      padding:14px;
    }

    .news-title{
      font-size:16px;
      font-weight:bold;
      margin-bottom:8px;
    }

    .news-source{
      font-size:12px;
      color:gray;
      margin-bottom:6px;
    }

    .news-summary{
      font-size:13px;
      color:#cbd5f5;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🚀 StockPulse</h2>
  <a href="index.html">Dashboard</a>
  <a href="halal.html">Halal</a>
  <a href="news.html">News</a>
  <a href="signals.html">Signals</a>
  <a href="alerts.html">Alerts</a>
</div>

<!-- MAIN -->
<div class="main">

<h1>📰 Market Intelligence</h1>

<div id="news" class="news-grid"></div>

</div>

<script src="news.js"></script>

</body>
</html>
