<!DOCTYPE html>
<html>
<head>
<title>StockPulse PRO - Market Intelligence</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:sans-serif;
  margin:0;
}

/* HEADER */
h1{
  text-align:center;
  padding:20px;
}

/* CONTAINER */
#news{
  max-width:800px;
  margin:auto;
  height:90vh;
  overflow-y:auto;
}

/* CARD */
.card{
  background:#1e293b;
  padding:20px;
  margin:15px;
  border-radius:12px;
  transition:0.3s;
  opacity:0;
  transform:translateY(20px);
}

/* HOVER */
.card:hover{
  transform:scale(1.02);
  box-shadow:0 0 15px rgba(0,255,255,0.3);
}

/* SHOW ANIMATION */
.show{
  opacity:1;
  transform:translateY(0);
}

/* IMPACT COLORS */
.high{border-left:5px solid red;}
.medium{border-left:5px solid orange;}
.low{border-left:5px solid lime;}

a{color:cyan;}
</style>

</head>

<body>

<h1>🧠 Market Intelligence Feed</h1>

<div id="news"></div>

<script>
const API = "https://stockpulsebadhoneditzx.up.railway.app/news";

/* 🔥 AI LOGIC */
function analyze(news){
  let text = (news.title + " " + news.summary).toLowerCase();

  let impact = "low";
  let effect = "Neutral market movement";

  if(text.includes("war") || text.includes("inflation") || text.includes("rate")){
    impact = "high";
    effect = "High volatility expected";
  }
  else if(text.includes("growth") || text.includes("earnings")){
    impact = "medium";
    effect = "Moderate bullish sentiment";
  }

  return {impact, effect};
}

/* 🚀 LOAD NEWS */
function loadNews(){
  fetch(API)
  .then(r => r.json())
  .then(d => {
    let n = document.getElementById("news");
    n.innerHTML = "";

    d.forEach((i,index) => {

      let ai = analyze(i);

      let div = document.createElement("div");
      div.className = "card " + ai.impact;

      div.innerHTML = `
        <h3>${i.title}</h3>

        <p><b>🧠 Analysis:</b> ${ai.effect}</p>

        <p>${i.summary}</p>

        <p><b>📊 Impact:</b> ${ai.impact.toUpperCase()}</p>

        <a href="${i.url}" target="_blank">🔗 Read more</a>
      `;

      n.appendChild(div);

      setTimeout(()=>{
        div.classList.add("show");
      }, index * 120);
    });

  });
}

/* AUTO REFRESH */
setInterval(loadNews, 30000);

/* INIT */
loadNews();
</script>

</body>
</html>
