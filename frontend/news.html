<!DOCTYPE html>
<html>
<body style="background:#020617;color:white;font-family:sans-serif">

<h1>📰 Market News</h1>

<div id="news"></div>

<script>
fetch("https://stockpulsebadhoneditzx.up.railway.app/news")
.then(r=>r.json())
.then(d=>{
let n=document.getElementById("news");

d.forEach(i=>{
let div=document.createElement("div");
div.innerHTML=`<h3>${i.title}</h3><p>${i.cause}</p>`;
n.appendChild(div);
});
});
</script>

</body>
</html>
