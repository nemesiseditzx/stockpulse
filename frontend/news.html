<!DOCTYPE html>
<html>
<head>
<title>StockPulse PRO - News</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:sans-serif;
  margin:0;
}

/* HEADER */
h1{
  text-align:center;
  padding:20px;
}

/* NEWS CONTAINER */
#news{
  max-width:800px;
  margin:auto;
}

/* CARD */
.card{
  background:#1e293b;
  padding:20px;
  margin:15px;
  border-radius:12px;
  transition:0.3s;
  opacity:0;
  transform:translateY(20px);
}

/* HOVER EFFECT */
.card:hover{
  transform:scale(1.03);
  box-shadow:0 0 15px rgba(0,255,255,0.3);
}

/* FADE IN ANIMATION */
.show{
  opacity:1;
  transform:translateY(0);
}

/* LINK */
a{
  color:cyan;
  text-decoration:none;
}

a:hover{
  text-decoration:underline;
}
</style>

</head>

<body>

<h1>📰 Market News</h1>

<div id="news"></div>

<script>
const API = "https://stockpulsebadhoneditzx.up.railway.app/news";

function loadNews(){
  fetch(API)
  .then(r => r.json())
  .then(d => {
    let n = document.getElementById("news");
    n.innerHTML = "";

    d.forEach((i, index) => {
      let div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h3>${i.title}</h3>
        <p>${i.summary}</p>
        <a href="${i.url}" target="_blank">🔗 Read more</a>
      `;

      n.appendChild(div);

      // animation delay
      setTimeout(() => {
        div.classList.add("show");
      }, index * 150);
    });
  })
  .catch(() => {
    document.getElementById("news").innerHTML = "Error loading news";
  });
}

// AUTO REFRESH (every 60 sec)
setInterval(loadNews, 60000);

// INIT
loadNews();
</script>

</body>
</html>
