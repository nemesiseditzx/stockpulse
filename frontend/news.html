fetch("https://stockpulsebadhoneditzx.up.railway.app/news")
.then(r => r.json())
.then(d => {
  let n = document.getElementById("news");

  n.innerHTML = "";

  d.forEach(i => {
    let div = document.createElement("div");

    div.innerHTML = `
      <h3>${i.title}</h3>
      <p>${i.summary}</p>
      <a href="${i.url}" target="_blank">Read more</a>
      <hr>
    `;

    n.appendChild(div);
  });
});
