<!DOCTYPE html>
<html>
<head>
  <title>StockPulse Pro</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #stocks {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 180px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 8px 12px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      margin: 5px;
    }

    #alertBar {
      margin-top:15px;
      padding:10px;
      background:#111827;
      border-radius:8px;
      font-weight:bold;
      color:#facc15;
    }

    .footer {
      margin-top: 40px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<h1>📊 StockPulse PRO</h1>
<p>by BADHON EDITZX</p>

<div id="alertBar">Loading alerts...</div>

<!-- SEARCH -->
<div>
  <input id="searchSymbol" placeholder="AAPL, TSLA, BTCUSDT">
  <button onclick="searchChart()">Search</button>
  <button onclick="addToWatchlist()">⭐ Add</button>
</div>

<!-- 🕌 HALAL -->
<h2>🕌 Halal Checker</h2>
<input id="halalInput" placeholder="Enter stock">
<button onclick="checkHalal()">Check</button>
<p id="halalResult"></p>

<!-- WATCHLIST -->
<h2>📌 Watchlist</h2>
<div id="watchlist"></div>

<div id="stocks"></div>

<!-- CHART -->
<div style="margin-top:40px;">
  <iframe id="tvChart"
    src="https://s.tradingview.com/widgetembed/?symbol=NASDAQ:AAPL&interval=1&theme=dark"
    width="90%" height="500"></iframe>
</div>

<!-- NEWS -->
<div id="news"></div>

<div class="footer">
  © 2026 StockPulse | Built by BADHON EDITZX
</div>

<script>
const API = "https://stockpulsebadhoneditzx.up.railway.app/";

// SEARCH
function searchChart() {
  let s = document.getElementById("searchSymbol").value.toUpperCase();
  let symbol = s.includes("BTC") ? "BINANCE:"+s : "NASDAQ:"+s;
  document.getElementById("tvChart").src =
    `https://s.tradingview.com/widgetembed/?symbol=${symbol}&theme=dark`;
}

// WATCHLIST
function addToWatchlist() {
  let s = document.getElementById("searchSymbol").value.toUpperCase();
  let list = JSON.parse(localStorage.getItem("watchlist")) || [];
  if (!list.includes(s)) list.push(s);
  localStorage.setItem("watchlist", JSON.stringify(list));
  renderWatchlist();
}

function renderWatchlist() {
  let list = JSON.parse(localStorage.getItem("watchlist")) || [];
  let container = document.getElementById("watchlist");
  container.innerHTML = "";

  list.forEach(s => {
    let btn = document.createElement("button");
    btn.innerText = s;
    btn.onclick = () => searchChart(s);
    container.appendChild(btn);
  });
}

// HALAL
function checkHalal() {
  let s = document.getElementById("halalInput").value;
  fetch(API + "halal/" + s)
    .then(r => r.json())
    .then(d => {
      document.getElementById("halalResult").innerText =
        d.symbol + ": " + d.status;
    });
}

// ALERT
function updateAlerts(data) {
  let alerts = [];
  Object.keys(data).forEach(s => {
    let i = data[s];
    if (i.change > 2) alerts.push("🚀 "+s);
    if (i.change < -2) alerts.push("⚠️ "+s);
  });
  document.getElementById("alertBar").innerText =
    alerts.join(" | ") || "No alerts";
}

// DATA
function loadData() {
  fetch(API)
    .then(r => r.json())
    .then(data => {
      let c = document.getElementById("stocks");
      c.innerHTML = "";

      Object.keys(data).forEach(s => {
        let i = data[s];
        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <h3>${s}</h3>
          <p>$${i.price}</p>
          <p>${i.change}%</p>
          <p>${i.signal}</p>
          <p>${i.prediction}</p>
          <p>${i.confidence}%</p>
          <p>${i.volatility}</p>
        `;
        c.appendChild(div);
      });

      updateAlerts(data);
    });
}

// NEWS
function loadNews() {
  fetch(API+"news")
    .then(r=>r.json())
    .then(data=>{
      let c=document.getElementById("news");
      c.innerHTML="<h2>🌍 Market News</h2>";

      data.forEach(n=>{
        let div=document.createElement("div");
        div.innerHTML=`
          <p>${n.impact} | ${n.direction}</p>
          <p>${n.summary}</p>
        `;
        c.appendChild(div);
      });
    });
}

renderWatchlist();
loadData();
loadNews();
setInterval(loadData,5000);
</script>

</body>
</html>
