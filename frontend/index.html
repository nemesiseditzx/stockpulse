<!DOCTYPE html>
<html>
<head>
<title>StockPulse PRO</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  width:180px;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

#stocks{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

button,input{
  padding:8px;
  margin:5px;
  border-radius:5px;
  border:none;
}

.section{
  margin-top:30px;
}
</style>
</head>

<body>

<h1>📊 StockPulse PRO</h1>
<p>by BADHON EDITZX</p>

<!-- SEARCH -->
<input id="search" placeholder="AAPL">
<button onclick="search()">Search</button>

<!-- CHART -->
<div class="section">
  <iframe id="chart" width="90%" height="400"></iframe>
</div>

<!-- WATCHLIST -->
<div class="section">
<h2>📌 Watchlist</h2>
<div id="watch"></div>
</div>

<!-- STOCKS -->
<div id="stocks"></div>

<!-- HALAL FEATURE (SEPARATE BIG SECTION) -->
<div class="section">
<h2>🕌 Halal Stock Checker</h2>

<input id="halalInput" placeholder="Enter stock (AAPL)">
<button onclick="checkHalal()">Check</button>

<p id="halalResult"></p>

</div>

<script>
const API="https://stockpulsebadhoneditzx.up.railway.app/";

/* ✅ PERFECT CHART FIX */
function search(symbol){
let s = symbol || document.getElementById("search").value;
if(!s) return;

s = s.toUpperCase();

let full = "NASDAQ:"+s;

if(s==="BTC" || s==="BTCUSD") full="BINANCE:BTCUSDT";
if(s==="ETH" || s==="ETHUSD") full="BINANCE:ETHUSDT";

document.getElementById("chart").src =
"https://s.tradingview.com/widgetembed/?symbol="+full+"&interval=1&theme=dark";
}

/* WATCHLIST */
function add(s){
let list=JSON.parse(localStorage.getItem("watch"))||[];

if(!list.includes(s)){
list.push(s);
localStorage.setItem("watch",JSON.stringify(list));
}

renderWatch();
}

function renderWatch(){
let list=JSON.parse(localStorage.getItem("watch"))||[];
let c=document.getElementById("watch");

c.innerHTML="";

list.forEach(s=>{
let b=document.createElement("button");

b.innerText=s;

b.onclick=()=>search(s);

c.appendChild(b);
});
}

/* LOAD STOCKS */
function load(){
fetch(API)
.then(r=>r.json())
.then(d=>{
let c=document.getElementById("stocks");
c.innerHTML="";

Object.keys(d).forEach(s=>{
let i=d[s];

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<h3 onclick="search('${s}')" style="cursor:pointer;">${s}</h3>
<p>$${i.price}</p>
<p style="color:${i.change>=0?'lime':'red'}">${i.change}%</p>
<p>${i.signal}</p>
<button onclick="add('${s}')">⭐ Add</button>
`;

c.appendChild(div);
});
});
}

/* HALAL CHECK */
function checkHalal(){
let s=document.getElementById("halalInput").value;

fetch(API+"halal/"+s)
.then(r=>r.json())
.then(d=>{
document.getElementById("halalResult").innerText=d.status;
});
}

/* INIT */
renderWatch();
load();
setInterval(load,5000);
</script>

</body>
</html>
