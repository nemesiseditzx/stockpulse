<!DOCTYPE html>
<html>
<head>
<title>StockPulse PRO</title>

<style>
body{margin:0;display:flex;background:#020617;color:white;font-family:sans-serif}
.sidebar{width:220px;background:#0f172a;height:100vh;padding:20px}
.sidebar a{display:block;color:white;padding:10px;text-decoration:none}
.sidebar a:hover{background:#1e293b}
.main{flex:1;padding:20px}
#chart{height:500px}
.card{background:#111;padding:10px;margin:5px;border-radius:8px}
</style>
</head>

<body>

<div class="sidebar">
<h2>🚀 StockPulse</h2>
<a href="/index.html">Dashboard</a>
<a href="/halal.html">Halal</a>
<a href="/news.html">News</a>
<a href="/signals.html">Signals</a>
<a href="/alerts.html">Alerts</a>
</div>

<div class="main">

<h1>Dashboard</h1>

<input id="search" placeholder="AAPL">
<button onclick="search()">Search</button>

<div id="chart"></div>

<h2>Stocks</h2>
<div id="stocks"></div>

</div>

<script>
const API="https://stockpulsebadhoneditzx.up.railway.app/";

function search(symbol){
let s=symbol||document.getElementById("search").value;
if(!s)return;

let c=document.getElementById("chart");
c.innerHTML="";

let script=document.createElement("script");
script.src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
script.innerHTML=JSON.stringify({"symbol":"NASDAQ:"+s,"theme":"dark","autosize":true});

c.appendChild(script);
}

function load(){
fetch(API+"stocks")
.then(r=>r.json())
.then(d=>{
let c=document.getElementById("stocks");
c.innerHTML="";

Object.keys(d).forEach(s=>{
let i=d[s];

let div=document.createElement("div");
div.className="card";

div.innerHTML=`${s} - $${i.price} (${i.signal})`;

c.appendChild(div);
});
});
}

search("AAPL");
load();
</script>

</body>
</html>
