<!DOCTYPE html>
<html>
<head>
<title>StockPulse PRO</title>

<style>
body{background:#020617;color:white;font-family:Arial;text-align:center;}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  width:180px;
  transition:0.3s;
}
.card:hover{transform:scale(1.05);}

#stocks{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

.news,.tweet{
  background:#0f172a;
  margin:10px;
  padding:15px;
  border-radius:10px;
}

button,input{
  padding:8px;
  margin:5px;
  border-radius:5px;
  border:none;
}
</style>
</head>

<body>

<h1>📊 StockPulse PRO</h1>
<p>by BADHON EDITZX</p>

<input id="search" placeholder="AAPL">
<button onclick="search()">Search</button>

<h2>📌 Watchlist</h2>
<div id="watch"></div>

<div id="stocks"></div>

<!-- CHART -->
<iframe id="chart" width="90%" height="400"></iframe>

<!-- TWEETS -->
<h2>🐦 Market Feed</h2>
<div id="tweets"></div>

<!-- NEWS -->
<div id="news"></div>

<!-- HALAL -->
<h2>🕌 Halal Checker</h2>
<input id="halal">
<button onclick="checkHalal()">Check</button>
<p id="result"></p>

<script>
const API="https://stockpulsebadhoneditzx.up.railway.app/";

/* CHART FIX */
function search(symbol){
let s=symbol||document.getElementById("search").value;
if(!s) return;

s=s.toUpperCase();

let full="NASDAQ:"+s;
if(s.includes("BTC")) full="BINANCE:BTCUSDT";
if(s.includes("ETH")) full="BINANCE:ETHUSDT";

document.getElementById("chart").src =
"https://s.tradingview.com/widgetembed/?symbol="+full+"&interval=1&theme=dark";
}

/* WATCHLIST */
function add(s){
let list=JSON.parse(localStorage.getItem("w"))||[];
if(!list.includes(s)) list.push(s);
localStorage.setItem("w",JSON.stringify(list));
render();
}

function render(){
let list=JSON.parse(localStorage.getItem("w"))||[];
let c=document.getElementById("watch");
c.innerHTML="";

list.forEach(s=>{
let b=document.createElement("button");
b.innerText=s;
b.onclick=()=>search(s);
c.appendChild(b);
});
}

/* DATA */
function load(){
fetch(API).then(r=>r.json()).then(d=>{
let c=document.getElementById("stocks");
c.innerHTML="";

Object.keys(d).forEach(s=>{
let i=d[s];

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<h3 onclick="search('${s}')">${s}</h3>
<p>$${i.price}</p>
<p>${i.change}%</p>
<p>${i.signal}</p>
<button onclick="add('${s}')">⭐</button>
`;

c.appendChild(div);
});
});
}

/* NEWS */
function news(){
fetch(API+"news").then(r=>r.json()).then(d=>{
let c=document.getElementById("news");
c.innerHTML="<h2>🌍 Market Intelligence</h2>";

d.forEach(n=>{
let div=document.createElement("div");
div.className="news";

div.innerHTML=`
<p><b>${n.effect}</b></p>
<p>${n.title}</p>
<p style="opacity:0.7;">Cause: ${n.reason}</p>
`;

c.appendChild(div);
});
});
}

/* TWEETS */
function tweets(){
fetch(API+"tweets").then(r=>r.json()).then(d=>{
let c=document.getElementById("tweets");
c.innerHTML="";

d.forEach(t=>{
let div=document.createElement("div");
div.className="tweet";

div.innerHTML=`
<p>${t.text}</p>
<p style="color:orange">${t.impact}</p>
<a href="${t.link}" target="_blank">View</a>
`;

c.appendChild(div);
});
});
}

/* HALAL */
function checkHalal(){
let s=document.getElementById("halal").value;
fetch(API+"halal/"+s)
.then(r=>r.json())
.then(d=>{
document.getElementById("result").innerText=d.status;
});
}

/* INIT */
render();
load();
news();
tweets();

setInterval(load,5000);
setInterval(tweets,5000);
</script>

</body>
</html>
