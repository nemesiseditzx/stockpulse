<!DOCTYPE html>
<html>
<head>
  <title>StockPulse</title>
</head>
<body>

<h1>🚀 StockPulse Live</h1>
<p id="status">Loading...</p>

<script>
fetch("https://stockpulsebadhoneditzx.up.railway.app/")
  .then(res => res.json())
  .then(data => {
    document.getElementById("status").innerText = data.status;
  })
  .catch((err) => {
    document.getElementById("status").innerText = "Error connecting backend";
  });
</script>

</body>
</html>
