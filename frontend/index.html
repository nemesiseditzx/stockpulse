<!DOCTYPE html>
<html>
<head>
  <title>StockPulse Pro</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #stocks {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 150px;
    }

    #news {
      margin-top: 40px;
    }
  </style>
</head>

<body>

<h1>📊 StockPulse PRO</h1>

<div id="stocks"></div>

<!-- 🔥 REAL TRADINGVIEW CHART -->
<div style="margin-top:40px;">
  <iframe 
    src="https://s.tradingview.com/widgetembed/?symbol=NASDAQ:AAPL&interval=1&hidesidetoolbar=1&theme=dark"
    width="90%" 
    height="500"
    frameborder="0">
  </iframe>
</div>

<!-- NEWS -->
<div id="news"></div>

<script>
const API = "https://stockpulsebadhoneditzx.up.railway.app/";

function loadData() {
  fetch(API)
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("stocks");
      container.innerHTML = "";

      Object.keys(data).forEach(symbol => {
        const item = data[symbol];
        const color = item.change >= 0 ? "lime" : "red";

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <h2>${symbol}</h2>
          <p>$${item.price}</p>
          <p style="color:${color}">
            ${item.change > 0 ? "+" : ""}${item.change}%
          </p>
        `;

        container.appendChild(div);
      });
    });
}

function loadNews() {
  fetch(API + "news")
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("news");
      container.innerHTML = "<h2>📰 Market News</h2>";

      data.forEach(item => {
        const div = document.createElement("div");

        div.innerHTML = `
          <a href="${item.url}" target="_blank" style="color:white">
            ${item.title}
          </a>
        `;

        container.appendChild(div);
      });
    });
}

loadData();
loadNews();

setInterval(loadData, 5000);
</script>

</body>
</html>
