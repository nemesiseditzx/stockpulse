<!DOCTYPE html>
<html>
<head>
<title>StockPulse Pro</title>

<style>
body{background:#0f172a;color:white;font-family:Arial;text-align:center;}
.card{background:#1e293b;padding:15px;border-radius:10px;width:180px;}
#stocks{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;}
button,input{padding:8px;margin:5px;border-radius:5px;border:none;}
#alertBar{background:#111827;padding:10px;margin-top:10px;}
</style>
</head>

<body>

<h1>📊 StockPulse PRO</h1>
<p>by BADHON EDITZX</p>

<div id="alertBar">Loading alerts...</div>

<input id="searchSymbol" placeholder="AAPL">
<button onclick="searchChart()">Search</button>
<button onclick="addWatch()">⭐ Add</button>

<h2>📌 Watchlist</h2>
<div id="watchlist"></div>

<div id="stocks"></div>

<iframe id="chart" width="90%" height="400"></iframe>

<div id="news"></div>

<!-- HALAL SECTION (BOTTOM) -->
<h2>🕌 Halal Checker</h2>
<input id="halalInput">
<button onclick="checkHalal()">Check</button>
<p id="halalResult"></p>

<script>
const API="https://stockpulsebadhoneditzx.up.railway.app/";

// SEARCH FIX
function searchChart(symbol){
let s = symbol || document.getElementById("searchSymbol").value;
if(!s) return;

s=s.toUpperCase();
let full = s.includes("BTC")?"BINANCE:"+s:"NASDAQ:"+s;

document.getElementById("chart").src =
`https://s.tradingview.com/widgetembed/?symbol=${full}&theme=dark`;
}

// WATCHLIST FIX
function addWatch(){
let s=document.getElementById("searchSymbol").value.toUpperCase();
let list=JSON.parse(localStorage.getItem("w"))||[];
if(!list.includes(s)) list.push(s);
localStorage.setItem("w",JSON.stringify(list));
renderWatch();
}

function renderWatch(){
let list=JSON.parse(localStorage.getItem("w"))||[];
let c=document.getElementById("watchlist");
c.innerHTML="";

list.forEach(s=>{
let b=document.createElement("button");
b.innerText=s;
b.onclick=()=>searchChart(s);
c.appendChild(b);
});
}

// ALERT
function alerts(data){
let arr=[];
Object.keys(data).forEach(s=>{
if(data[s].change>2) arr.push("🚀 "+s);
if(data[s].change<-2) arr.push("⚠️ "+s);
});
document.getElementById("alertBar").innerText =
arr.join(" | ")||"No alerts";
}

// DATA
function load(){
fetch(API).then(r=>r.json()).then(d=>{
let c=document.getElementById("stocks");
c.innerHTML="";

Object.keys(d).forEach(s=>{
let i=d[s];
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<h3>${s}</h3>
<p>$${i.price}</p>
<p>${i.change}%</p>
<p>${i.signal}</p>
<p>${i.prediction}</p>
<p>${i.confidence}%</p>
<p>${i.volatility}</p>
`;

c.appendChild(div);
});

alerts(d);
});
}

// NEWS UPGRADE
function loadNews(){
fetch(API+"news").then(r=>r.json()).then(d=>{
let c=document.getElementById("news");
c.innerHTML="<h2>🌍 Market Intelligence</h2>";

d.forEach(n=>{
let div=document.createElement("div");

div.innerHTML=`
<p><b>${n.impact}</b></p>
<p>Reason: ${n.reason}</p>
<p>Possible Effect: ${n.effect}</p>
`;

c.appendChild(div);
});
});
}

// HALAL FIX
function checkHalal(){
let s=document.getElementById("halalInput").value;
fetch(API+"halal/"+s)
.then(r=>r.json())
.then(d=>{
document.getElementById("halalResult").innerText=d.status;
});
}

// INIT
renderWatch();
load();
loadNews();
setInterval(load,5000);
</script>

</body>
</html>
