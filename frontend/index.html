<!DOCTYPE html>
<html>
<head>
<title>StockPulse PRO</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
}

/* GLOW CARDS */
.card{
  background:rgba(30,41,59,0.6);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:12px;
  width:180px;
  transition:0.3s;
  box-shadow:0 0 10px rgba(0,255,255,0.1);
}

.card:hover{
  transform:scale(1.08);
  box-shadow:0 0 20px cyan;
}

#stocks{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

/* INPUT */
input{
  padding:10px;
  border-radius:6px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:#0ea5e9;
  color:white;
  cursor:pointer;
}

/* NEWS CARD */
.news{
  background:#0f172a;
  margin:10px;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 15px rgba(255,255,255,0.05);
  animation:fade 0.5s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1;}
}

</style>
</head>

<body>

<h1>📊 StockPulse PRO</h1>
<p>by BADHON EDITZX</p>

<input id="search" placeholder="AAPL">
<button onclick="search()">Search</button>

<h2>📌 Watchlist</h2>
<div id="watch"></div>

<div id="stocks"></div>

<!-- FIXED CHART -->
<div style="margin-top:30px;">
<iframe id="chart" width="90%" height="400"></iframe>
</div>

<div id="news"></div>

<!-- HALAL -->
<h2>🕌 Halal Checker</h2>
<input id="halal">
<button onclick="checkHalal()">Check</button>
<p id="result"></p>

<script>
const API="https://stockpulsebadhoneditzx.up.railway.app/";

/* CHART FIX */
function search(s){
let sym=s||document.getElementById("search").value;
sym=sym.toUpperCase();

let full=sym.includes("BTC")?"BINANCE:"+sym:"NASDAQ:"+sym;

document.getElementById("chart").src=
`https://s.tradingview.com/widgetembed/?symbol=${full}&interval=1&theme=dark`;
}

/* WATCH FIX */
function add(s){
let list=JSON.parse(localStorage.getItem("w"))||[];
if(!list.includes(s)) list.push(s);
localStorage.setItem("w",JSON.stringify(list));
render();
}

function render(){
let list=JSON.parse(localStorage.getItem("w"))||[];
let c=document.getElementById("watch");
c.innerHTML="";

list.forEach(s=>{
let b=document.createElement("button");
b.innerText=s;
b.onclick=()=>search(s);
c.appendChild(b);
});
}

/* DATA */
function load(){
fetch(API).then(r=>r.json()).then(d=>{
let c=document.getElementById("stocks");
c.innerHTML="";

Object.keys(d).forEach(s=>{
let i=d[s];

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<h3>${s}</h3>
<p>$${i.price}</p>
<p>${i.change}%</p>
<p>${i.signal}</p>
<button onclick="add('${s}')">⭐</button>
`;

c.appendChild(div);
});
});
}

/* PREMIUM NEWS */
function news(){
fetch(API+"news").then(r=>r.json()).then(d=>{
let c=document.getElementById("news");
c.innerHTML="<h2>🌍 Market Impact</h2>";

d.forEach(n=>{
let div=document.createElement("div");
div.className="news";

div.innerHTML=`
<p><b>${n.effect}</b></p>
<p>${n.title}</p>
`;

c.appendChild(div);
});
});
}

/* HALAL */
function checkHalal(){
let s=document.getElementById("halal").value;
fetch(API+"halal/"+s)
.then(r=>r.json())
.then(d=>{
document.getElementById("result").innerText=d.status;
});
}

/* INIT */
render();
load();
news();
setInterval(load,5000);
</script>

</body>
</html>
