<!DOCTYPE html>
<html>
<head>
  <title>StockPulse Pro</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    #stocks {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 150px;
    }
  </style>
</head>

<body>

<h1>📊 StockPulse Pro</h1>

<div id="stocks"></div>

<script>
const API = "https://stockpulsebadhoneditzx.up.railway.app/";

function loadData() {
  fetch(API)
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("stocks");
      container.innerHTML = "";

      Object.keys(data).forEach(symbol => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <h2>${symbol}</h2>
          <p>$${data[symbol]}</p>
        `;

        container.appendChild(div);
      });
    });
}

// load instantly
loadData();

// refresh every 5 sec
setInterval(loadData, 5000);
</script>

</body>
</html>
