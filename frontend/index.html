<!DOCTYPE html>
<html>
<head>
  <title>StockPulse Pro</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #stocks {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 160px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 8px 12px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      margin: 5px;
    }

    #alertBar {
      margin-top:15px;
      padding:10px;
      background:#111827;
      border-radius:8px;
      font-weight:bold;
      color:#facc15;
    }

    .footer {
      margin-top: 40px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<h1>📊 StockPulse PRO</h1>
<p>by BADHON EDITZX</p>

<!-- 🔔 ALERT BAR -->
<div id="alertBar">Loading alerts...</div>

<!-- SEARCH -->
<div>
  <input id="searchSymbol" placeholder="AAPL, TSLA, BTCUSDT">
  <button onclick="searchChart()">Search</button>
  <button onclick="addToWatchlist()">⭐ Add</button>
</div>

<!-- WATCHLIST -->
<h2>📌 Watchlist</h2>
<div id="watchlist"></div>

<!-- STOCKS -->
<div id="stocks"></div>

<!-- CHART -->
<div style="margin-top:40px;">
  <iframe 
    id="tvChart"
    src="https://s.tradingview.com/widgetembed/?symbol=NASDAQ:AAPL&interval=1&theme=dark"
    width="90%" 
    height="500">
  </iframe>
</div>

<!-- NEWS -->
<div id="news"></div>

<div class="footer">
  © 2026 StockPulse | Built by BADHON EDITZX
</div>

<script>
const API = "https://stockpulsebadhoneditzx.up.railway.app/";

// SEARCH
function searchChart() {
  let symbol = document.getElementById("searchSymbol").value;
  if (!symbol) return;

  symbol = symbol.toUpperCase();

  if (symbol.includes("BTC") || symbol.includes("ETH")) {
    symbol = "BINANCE:" + symbol;
  } else {
    symbol = "NASDAQ:" + symbol;
  }

  document.getElementById("tvChart").src =
    `https://s.tradingview.com/widgetembed/?symbol=${symbol}&interval=1&theme=dark`;
}

// WATCHLIST
function addToWatchlist() {
  const input = document.getElementById("searchSymbol").value.toUpperCase();
  if (!input) return;

  let list = JSON.parse(localStorage.getItem("watchlist")) || [];

  if (!list.includes(input)) {
    list.push(input);
    localStorage.setItem("watchlist", JSON.stringify(list));
  }

  renderWatchlist();
}

function renderWatchlist() {
  const container = document.getElementById("watchlist");
  const list = JSON.parse(localStorage.getItem("watchlist")) || [];

  container.innerHTML = "";

  list.forEach(symbol => {
    const btn = document.createElement("button");

    let fullSymbol = symbol.includes("BTC")
      ? "BINANCE:" + symbol
      : "NASDAQ:" + symbol;

    btn.innerText = symbol;

    btn.onclick = () => {
      document.getElementById("tvChart").src =
        `https://s.tradingview.com/widgetembed/?symbol=${fullSymbol}&interval=1&theme=dark`;
    };

    container.appendChild(btn);
  });
}

// ALERT ENGINE
function updateAlerts(data) {
  let alerts = [];

  Object.keys(data).forEach(symbol => {
    const item = data[symbol];

    if (item.change > 2) {
      alerts.push(`🚀 ${symbol} pumping (${item.change}%)`);
    }

    if (item.change < -2) {
      alerts.push(`⚠️ ${symbol} dumping (${item.change}%)`);
    }
  });

  document.getElementById("alertBar").innerText =
    alerts.length ? alerts.join(" | ") : "No major alerts";
}

// STOCK DATA
function loadData() {
  fetch(API)
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("stocks");
      container.innerHTML = "";

      Object.keys(data).forEach(symbol => {
        const item = data[symbol];
        const color = item.change >= 0 ? "lime" : "red";

        const signalColor =
          item.signal.includes("BUY") ? "lime" :
          item.signal.includes("SELL") ? "red" : "gray";

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <h3>${symbol}</h3>
          <p>$${item.price}</p>
          <p style="color:${color}">
            ${item.change > 0 ? "+" : ""}${item.change}%
          </p>
          <p style="font-weight:bold; color:${signalColor}">
            ${item.signal}
          </p>
        `;

        container.appendChild(div);
      });

      updateAlerts(data);
    });
}

// NEWS
function loadNews() {
  fetch(API + "news")
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("news");
      container.innerHTML = "<h2>🌍 Market Intelligence</h2>";

      data.forEach(item => {
        const div = document.createElement("div");

        div.style.margin = "15px";
        div.style.padding = "10px";
        div.style.background = "#1e293b";
        div.style.borderRadius = "8px";

        div.innerHTML = `
          <p style="font-weight:bold;">
            ${item.impact} | ${item.direction}
          </p>
          <p>${item.summary}</p>
          <a href="${item.url}" target="_blank" style="color:lightblue;">
            Read full
          </a>
        `;

        container.appendChild(div);
      });
    });
}

// INIT
renderWatchlist();
loadData();
loadNews();

setInterval(loadData, 5000);
</script>

</body>
</html>
